name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest | next | beta)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write     # required for npm OIDC / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/alchemy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm >= 11.5.1 is required for OIDC trusted publishing
      - run: npm install -g npm@latest

      - name: Verify package metadata matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Publish (OIDC + provenance)
        run: npm publish --access public --provenance --tag "${{ inputs.tag || 'latest' }}"
