<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="ui-sans-serif,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="880" height="360" fill="url(#bg)"/>
  <text x="40" y="44" fill="#f0f6fc" font-size="22" font-weight="700">Strict security posture — enforced by default</text>
  <text x="40" y="66" fill="#8b949e" font-size="13">Every install applies these rules. No flags, no opt-out.</text>

  <g font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <!-- column 1 -->
    <g transform="translate(40,100)">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#0f1721" stroke="#1f2937"/>
      <text x="16" y="28" fill="#34d399" font-size="14" font-weight="700">✓ Always done</text>
      <g fill="#c9d1d9">
        <text x="16" y="58">openssl rand -base64 32 → ALCHEMY_PASSWORD</text>
        <text x="16" y="84">.env chmod 600 + gitignored</text>
        <text x="16" y="110">.env.example committed with empty values</text>
        <text x="16" y="136">.gitignore enforces .env, .alchemy/, *.pem</text>
        <text x="16" y="162">alchemy.secret() wraps every token</text>
        <text x="16" y="188">least-privilege CF API token scopes</text>
        <text x="16" y="214">AWS auth via SSO / OIDC</text>
      </g>
    </g>

    <!-- column 2 -->
    <g transform="translate(460,100)">
      <rect x="0" y="0" width="380" height="220" rx="8" fill="#1a0f12" stroke="#3b1f24"/>
      <text x="16" y="28" fill="#ff7b72" font-size="14" font-weight="700">✗ Refused</text>
      <g fill="#c9d1d9">
        <text x="16" y="58">inline literal tokens in source</text>
        <text x="16" y="84">committing .env or .alchemy/</text>
        <text x="16" y="110">long-lived AWS access keys in repo</text>
        <text x="16" y="136">Cloudflare Global API Key (unless forced)</text>
        <text x="16" y="162">echoing secrets to stdout</text>
        <text x="16" y="188">overwriting ALCHEMY_PASSWORD silently</text>
        <text x="16" y="214">staging files matching key/cred regexes</text>
      </g>
    </g>
  </g>
</svg>
